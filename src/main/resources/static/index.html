<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>숙소 예약 시스템</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>숙소 예약 시스템</h1>
      <p>Customer · Host · 예약 · 결제 · 환불 흐름 데모</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>객실 목록</h2>
      <div id="room-list" class="grid"></div>
    </section>

    <section class="card">
      <h2>숙소 예약 (Customer)</h2>
      <form id="reserve-form" class="form-grid">
        <label>
          객실 ID
          <input type="number" name="roomId" required min="101" max="103">
        </label>
        <label>
          사용자 ID
          <input type="text" name="userId" required placeholder="customer01">
        </label>
        <label>
          금액 (원)
          <input type="number" name="price" required min="1" placeholder="120000">
        </label>
        <label>
          체크인
          <input type="date" name="checkInDate" required>
        </label>
        <label>
          체크아웃
          <input type="date" name="checkOutDate" required>
        </label>
        <button type="submit" class="btn primary">숙소 예약</button>
      </form>
    </section>

    <section class="card">
      <h2>예약 목록</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>객실</th>
              <th>사용자</th>
              <th>금액</th>
              <th>상태</th>
              <th>체크인</th>
              <th>체크아웃</th>
              <th>액션</th>
            </tr>
          </thead>
          <tbody id="reservation-table"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>결제 이력</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>예약 ID</th>
              <th>금액</th>
              <th>유형</th>
            </tr>
          </thead>
          <tbody id="payment-table"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/app.js"></script>
</body>
</html>
